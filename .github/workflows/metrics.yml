name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MahMoud-Nabil1
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Africa/Cairo
          config_display: large
          config_animations: yes

          # Contribution calendar (no streak/commits stats)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Language stats
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 6

          # Topics as icons (star topics on github.com/topics first!)
          plugin_topics: yes
          plugin_topics_limit: 24
          plugin_topics_mode: icons
          plugin_topics_sort: stars

          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update GitHub metrics [skip ci]"
